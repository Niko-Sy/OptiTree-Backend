  /api/v1/documents/upload:
    post:
      tags: [Documents]
      summary: Upload one or more documents
      description: |
        Upload one or more files and return lightweight parsed document entries.

        Implementation notes:
        - Backend accepts both `files` and `files[]` for frontend compatibility.
        - At least one of `files` or `files[]` must be provided.
        - `quality` / `model` / `projectType` currently affect summary text in response.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Preferred frontend field for multi-file upload.
                files[]:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Compatible frontend field name; backend accepts it.
                quality:
                  type: string
                  enum: [fast, balanced, precise]
                  default: balanced
                model:
                  type: string
                  default: qwen3.5-flash
                projectType:
                  type: string
                  enum: [ft, kg]
                projectId:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Upload result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentUploadResponseData'

  /api/v1/documents/{docId}:
    get:
      tags: [Documents]
      summary: Get document by ID
      parameters:
        - in: path
          name: docId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          document:
                            $ref: '#/components/schemas/Document'

  /api/v1/ai/models:
    get:
