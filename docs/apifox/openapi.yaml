      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AIModelListData'

  /api/v1/ai/fault-trees/generate:
    post:
      tags: [AI]
      summary: Create async fault-tree generation task
      description: |
        Starts an asynchronous fault-tree generation job.
        Poll `GET /api/v1/ai/tasks/{taskId}` for progress and final result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIFaultTreeGenerateRequest'
            examples:
              default:
                value:
                  docIds: [doc_1, doc_2]
                  topEvent: 液压系统压力不足
                  config:
                    quality: balanced
                    model: qwen-plus
                    depth: 4
                    maxNodes: 100
      responses:
        '200':
          description: Task accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AIGenerateTaskAcceptedData'
        '401':
          $ref: '#/components/responses/UnauthorizedHttp'

  /api/v1/ai/knowledge-graphs/generate:
    post:
      tags: [AI]
      summary: Create async knowledge-graph generation task
      description: |
        Starts an asynchronous knowledge-graph generation job.
        Poll `GET /api/v1/ai/tasks/{taskId}` for progress and final result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIKnowledgeGraphGenerateRequest'
            examples:
              default:
                value:
                  docIds: [doc_1, doc_2]
                  config:
                    quality: balanced
                    model: qwen-plus
                    entityTypes: [component, event, cause]
      responses:
        '200':
          description: Task accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AIGenerateTaskAcceptedData'
        '401':
          $ref: '#/components/responses/UnauthorizedHttp'

  /api/v1/ai/chat:
    post:
      tags: [AI]
      summary: Single-turn AI chat about current graph context
      description: |
        Synchronous AI chat interface.

        Implementation notes:
        - Request body uses the field named type, matching the current backend handler.
        - Backend converts graph JSON into a natural-language summary before calling the LLM.
        - Response is returned in the standard API envelope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIChatRequest'
            examples:
              faultTree:
                value:
                  context:
                    projectId: proj_abc123
                    nodes: []
                    edges: []
                  type: faultTree
                  message: '分析当前故障树的结构，找出潜在的逻辑缺陷或不完整路径'
              knowledgeGraph:
                value:
                  context:
                    projectId: proj_kg_001
                    rfNodes: []
                    rfEdges: []
                  type: knowledgeGraph
                  message: '这个知识图谱里有哪些孤立实体和缺失关系'
      responses:
        '200':
          description: AI chat result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AIChatResponseData'
              examples:
                success:
                  value:
                    code: 0
                    message: ok
                    data:
                      reply: '当前故障树包含 12 个节点、9 条边，建议优先检查孤立逻辑门以及没有下游基本事件的中间事件。'
                      suggestions:
                        - 检查孤立节点
                        - 补充基本事件概率
                    requestId: e4d8bc8f-3d15-4cb8-8ff4-50bdfcb8d9b1
                    timestamp: '2026-03-10T08:00:00Z'
                failed:
                  value:
                    code: 42200
                    message: 'AI 请求失败: upstream timeout'
                    requestId: e4d8bc8f-3d15-4cb8-8ff4-50bdfcb8d9b1
                    timestamp: '2026-03-10T08:00:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedHttp'

  /api/v1/ai/chat/stream:
    post:
      tags: [AI]
      summary: Stream AI chat output with SSE
      description: |
        Streaming AI chat interface using Server-Sent Events (SSE).

        Implementation notes:
        - Request body uses the field named contextType, matching the current backend handler.
        - Response content type is text/event-stream, not the standard JSON envelope.
        - The backend forwards incremental content chunks as SSE data frames.
        - Final event contains tokensUsed and modelId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIChatStreamRequest'
            examples:
              faultTree:
                value:
                  context:
                    projectId: proj_abc123
                    nodes: []
                    edges: []
                  contextType: faultTree
                  message: '分析当前故障树的结构，找出潜在的逻辑缺陷或不完整路径'
              knowledgeGraph:
                value:
                  context:
                    projectId: proj_kg_001
                    rfNodes: []
                    rfEdges: []
                  contextType: knowledgeGraph
                  message: '这个知识图谱里有哪些孤立实体和缺失关系'
      responses:
        '200':
          description: SSE stream of content / done / error events
          content:
            text/event-stream:
              schema:
                type: string
                description: 'SSE frames encoded as data: <json> followed by a blank line.'
              examples:
                stream:
                  value: |
                    data: {"type":"content","content":"当前故障树包含 12 个节点"}

                    data: {"type":"content","content":"，其中 gate_3 处于孤立状态。"}

                    data: {"type":"done","tokensUsed":312,"modelId":"qwen3"}
                error:
                  value: |
                    data: {"type":"error","code":50300,"message":"upstream service unavailable"}
        '401':
          $ref: '#/components/responses/UnauthorizedHttp'

  /api/v1/ai/tasks/{taskId}:
    get:
      tags: [AI Tasks]
      summary: Get AI task status by ID
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AI task
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          task:
                            $ref: '#/components/schemas/AITask'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    UnauthorizedHttp:
      description: Unauthorized (HTTP 401)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
    MemberId:
      in: path
      name: memberId
      required: true
      schema:
        type: string
    VersionId:
      in: path
      name: versionId
      required: true
      schema:
        type: string
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    ApiEnvelope:
      type: object
      required: [code, message, requestId, timestamp]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          type: object
          nullable: true
          additionalProperties: true
        requestId:
          type: string
          example: e4d8bc8f-3d15-4cb8-8ff4-50bdfcb8d9b1
        timestamp:
          type: string
          format: date-time

    ErrorEnvelope:
      type: object
      required: [code, message, requestId, timestamp]
      properties:
        code:
          type: integer
          example: 40001
        message:
          type: string
          example: invalid parameter
        errors:
          nullable: true
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [username, email, password, agree]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        agree:
          type: boolean

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Username or email
        password:
          type: string
        remember:
          type: boolean
          default: false

    LoginData:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          example: 7200

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        avatar:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, inactive, banned]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true

    LoginLog:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        success:
          type: boolean
        ipAddress:
          type: string
          nullable: true
        region:
          type: string
        deviceInfo:
          type: string
        failReason:
          type: string
          nullable: true
        createdAt:
          type: string
